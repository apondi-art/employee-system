# ?????????????????????????????????????????????
#  DATABASE ? H2 In-Memory
# ?????????????????????????????????????????????

# The JDBC URL. "mem:employeedb" means the DB lives in RAM only.
# DB_CLOSE_DELAY=-1 keeps it alive as long as the app is running.
spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1

# H2's own JDBC driver class
spring.datasource.driver-class-name=org.h2.Driver

# Default H2 credentials ? fine for dev/testing
spring.datasource.username=sa
spring.datasource.password=

# ?????????????????????????????????????????????
#  JPA / HIBERNATE
# ?????????????????????????????????????????????

# Tells Hibernate which SQL dialect to generate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop = create all tables on startup, drop them on shutdown.
# Use "update" if you want data to survive restarts (not for H2 though).
spring.jpa.hibernate.ddl-auto=create-drop

# Prints every SQL statement Hibernate runs ? very useful while learning
spring.jpa.show-sql=true

# Formats the printed SQL so it's human-readable (indented)
spring.jpa.properties.hibernate.format_sql=true

# ?????????????????????????????????????????????
#  H2 BROWSER CONSOLE
# ?????????????????????????????????????????????

# Enables the web UI to inspect the DB live at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allows the console to be accessed from any machine (not just localhost)
# Set to false in any non-dev environment
spring.h2.console.settings.web-allow-others=false

# ?????????????????????????????????????????????
#  SERVER
# ?????????????????????????????????????????????

# The port  app running  on. Default is 8080.
server.port=8080

# A context path prefix for all endpoints.
# With this set, your endpoint becomes /api/v1/employees (already in @RequestMapping).
# Leave blank unless you want a global prefix on top of that.
server.servlet.context-path=/

# ?????????????????????????????????????????????
#  JSON / JACKSON
# ?????????????????????????????????????????????

# Dates like LocalDate serialize as "2025-04-19" instead of a timestamp array
spring.jackson.serialization.write-dates-as-timestamps=false

# Fields that are null are excluded from the JSON response (cleaner output)
spring.jackson.default-property-inclusion=non_null

# ?????????????????????????????????????????????
#  FILE UPLOAD (for Excel import)
# ?????????????????????????????????????????????

# Max size of a single uploaded file
spring.servlet.multipart.max-file-size=10MB

# Max size of the entire multipart request
spring.servlet.multipart.max-request-size=10MB

# ?????????????????????????????????????????????
#  LOGGING
# ?????????????????????????????????????????????

# Root log level ? INFO is standard for dev
logging.level.root=INFO

# See  service/controller logs in detail
logging.level.com.yourname.employee=DEBUG

# See every SQL + its bound parameters
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE